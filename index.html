<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render Table JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Data Mahasiswa</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody id="table-mahasiswa"></tbody>
    </table>

    <h2>Data Dosen</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody id="table-dosen"></tbody>
    </table>

    <script>
        // Data 1
        const mahasiswa = [
            { id: 1, nama: "Andi" },
            { id: 2, nama: "Budi" },
            { id: 3, nama: "Citra" }
        ];

        // Data 2 (struktur sama)
        const dosen = [
            { id: 101, nama: "Pak Joko" },
            { id: 102, nama: "Bu Sari" },
            { id: 103, nama: "Pak Rudi" }
        ];

        // Fungsi reusable (tetap DRY)
        function renderTable(data, targetId) {
            const tableBody = document.getElementById(targetId);
            tableBody.innerHTML = "";

            data.forEach(item => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.nama}</td>
                    </tr>
                `;
            });
        }

        // Pemanggilan (modular & scalable)
        renderTable(mahasiswa, "table-mahasiswa");
        renderTable(dosen, "table-dosen");
    </script>

</body>
</html>
