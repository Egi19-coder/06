
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render Table JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Data Mahasiswa</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <!-- Data dari JS masuk sini -->
        </tbody>
    </table>

    <script>
        // Data JSON
        const data = [
            { id: 1, nama: "Andi" },
            { id: 2, nama: "Budi" },
            { id: 3, nama: "Citra" }
        ];

        // Fungsi render (DRY & reusable)
        function renderTable(data) {
            const tableBody = document.getElementById("data-table");
            tableBody.innerHTML = "";

            data.forEach(item => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.nama}</td>
                    </tr>
                `;
            });
        }

        // Panggil fungsi
        renderTable(data);
    </script>

</body>
</html>
